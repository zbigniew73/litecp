<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <!-- Background rounded rect -->
    <clipPath id="roundClip">
      <rect width="500" height="500" rx="100" ry="100"/>
    </clipPath>
    <!-- Blue gradient for the L letter -->
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5BC8F5;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#2563EB;stop-opacity:1"/>
    </linearGradient>
    <!-- Dark gradient for server stack panels -->
    <linearGradient id="panelGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2D3A52;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1A2235;stop-opacity:1"/>
    </linearGradient>
    <!-- Panel highlight -->
    <linearGradient id="panelHighlight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3A4A6A;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#253045;stop-opacity:1"/>
    </linearGradient>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E2A40;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#111827;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="500" height="500" rx="100" ry="100" fill="url(#bgGrad)"/>

  <!-- Server stack panels (3 bars, right side of L) -->
  <!-- Top panel -->
  <rect x="248" y="108" width="148" height="52" rx="10" fill="url(#panelGrad)" stroke="#3A4D6A" stroke-width="1.5"/>
  <rect x="248" y="108" width="148" height="18" rx="10" fill="url(#panelHighlight)" opacity="0.5"/>
  <!-- dot green -->
  <circle cx="372" cy="134" r="8" fill="#4ADE80"/>
  <circle cx="372" cy="134" r="4" fill="#86EFAC" opacity="0.6"/>

  <!-- Middle panel -->
  <rect x="248" y="176" width="148" height="52" rx="10" fill="url(#panelGrad)" stroke="#3A4D6A" stroke-width="1.5"/>
  <rect x="248" y="176" width="148" height="18" rx="10" fill="url(#panelHighlight)" opacity="0.5"/>
  <!-- dot blue -->
  <circle cx="372" cy="202" r="8" fill="#60A5FA"/>
  <circle cx="372" cy="202" r="4" fill="#BAE6FD" opacity="0.6"/>

  <!-- Bottom panel -->
  <rect x="248" y="244" width="148" height="52" rx="10" fill="url(#panelGrad)" stroke="#3A4D6A" stroke-width="1.5"/>
  <rect x="248" y="244" width="148" height="18" rx="10" fill="url(#panelHighlight)" opacity="0.5"/>
  <!-- dot purple -->
  <circle cx="372" cy="270" r="8" fill="#A78BFA"/>
  <circle cx="372" cy="270" r="4" fill="#DDD6FE" opacity="0.6"/>

  <!-- Letter L shape (vertical bar + horizontal bottom bar) -->
  <!-- Vertical bar of L -->
  <rect x="104" y="108" width="88" height="236" rx="14" fill="url(#blueGrad)"/>
  <!-- Horizontal bar of L (bottom) -->
  <rect x="104" y="296" width="200" height="48" rx="14" fill="url(#blueGrad)"/>

  <!-- Text: Lite + cp -->
  <!-- "Lite" white bold -->
  <text x="96" y="400" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-weight="700" font-size="64" fill="#FFFFFF" letter-spacing="-1">Lite</text>
  <!-- "cp" lighter blue -->
  <text x="254" y="400" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-weight="400" font-size="64" fill="#60A5FA" letter-spacing="-1">cp</text>
</svg>
